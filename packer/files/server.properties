# ── Réseau ────────────────────────────────────────────────────────────────────
# Port TCP sur lequel le serveur écoute (défaut Minecraft : 25565)
server-port=25565

# ── Gameplay ──────────────────────────────────────────────────────────────────
# Mode de jeu par défaut des nouveaux joueurs
# survival | creative | adventure | spectator
gamemode=survival

# Niveau de difficulté des mobs et de la faim
# peaceful (pas de mobs hostiles) | easy | normal | hard
difficulty=normal

# Nombre max de joueurs simultanés (Always Free : 10 est raisonnable avec 12 GB RAM)
max-players=10

# ── Performance ───────────────────────────────────────────────────────────────
# Distance de rendu en chunks (1 chunk = 16 blocs)
# Plus élevé = plus beau mais plus de RAM/CPU — 10 est un bon équilibre
view-distance=10

# Distance de simulation des entités et de la redstone (doit être <= view-distance)
# Réduit la charge CPU sans impacter la visibilité
simulation-distance=8

# ── Sécurité ──────────────────────────────────────────────────────────────────
# true  = vérifie les comptes Minecraft.net (recommandé, empêche les comptes piratés)
# false = serveur "cracked", n'importe qui peut se connecter sans compte légitime
online-mode=true

# true = seuls les joueurs sur la whitelist peuvent se connecter
# Activer si le serveur est privé (amis uniquement)
white-list=false

# Rayon de protection autour du spawn (en blocs) — les joueurs non-ops ne peuvent pas construire
# 0 = désactivé, 16 = protection raisonnable pour le spawn
spawn-protection=16

# ── Monde ─────────────────────────────────────────────────────────────────────
# Nom du dossier du monde dans le répertoire de données
level-name=world

# Message affiché dans la liste des serveurs Minecraft
motd=LuckFlash Minecraft Server

# ── RCON (console distante) ────────────────────────────────────────────────────
# Permet à minecraft-prometheus-exporter et mcrcon d'interroger le serveur
# Le mot de passe est un placeholder — remplacé par cloud-init au déploiement
# Fichier en 0640 minecraft:minecraft sur le serveur (non lisible par les autres users)
enable-rcon=true
rcon.port=25575
rcon.password=RCON_PASSWORD_PLACEHOLDER
